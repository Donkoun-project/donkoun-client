<section class="hero">
  <div class="hero-inner">

    <span class="eyebrow">
      <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0l3.09 6.26L22 7.27l-5 4.87 1.18 6.88L12 15.77l-6.18 3.25L7 12.14 2 7.27l6.91-1.01L12 0z"/></svg>
      Co-livraison internationale
    </span>

    <h1>
      Envoyez vos colis avec des<br>
      <span class="accent">voyageurs de confiance</span>
    </h1>

    <p class="hero-sub">
      Connectez-vous avec des voyageurs qui se rendent à votre destination.<br>
      Simple, économique et sécurisé.
    </p>

    <form [formGroup]="filterForm" (ngSubmit)="onSearch()" class="search-pill">

      <div class="pill-field">
        <svg class="pill-ico" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <circle cx="12" cy="10" r="3"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 6.9 8 11.7z"/>
        </svg>
        <div class="pill-field-inner">
          <label for="origin">Départ</label>
          <input id="origin" type="text" formControlName="origin" placeholder="Paris, Lyon…" autocomplete="off">
        </div>
      </div>

      <div class="pill-divider" aria-hidden="true"></div>

      <div class="pill-field">
        <svg class="pill-ico" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a2 2 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <div class="pill-field-inner">
          <label for="destination">Destination</label>
          <input id="destination" type="text" formControlName="destination" placeholder="Abidjan, Dakar…" autocomplete="off">
        </div>
      </div>

      <button type="submit" class="pill-btn">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/>
          <path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
        </svg>
        Rechercher
      </button>

    </form>

    <div class="trust-row">
      <div class="trust-item">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
        Paiement sécurisé
      </div>
      <span class="trust-dot"></span>
      <div class="trust-item">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Voyageurs vérifiés
      </div>
      <span class="trust-dot"></span>
      <div class="trust-item">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Destinations mondiales
      </div>
      <span class="trust-dot"></span>
      <div class="trust-item">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Tarifs économiques
      </div>
    </div>

  </div>
</section>
