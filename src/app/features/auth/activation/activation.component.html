<div class="auth-page">
  <div class="auth-card">

    <h1 class="auth-title">Activation du compte</h1>
    <p class="auth-sub">Entrez le code à 6 chiffres envoyé à votre adresse email</p>

    <!-- Email badge -->
    <div *ngIf="email" class="email-badge">
      <i class="fas fa-envelope"></i>
      <span>{{ email }}</span>
    </div>

    <!-- Messages -->
    <div *ngIf="isSuccess" class="auth-alert auth-alert--success">
      <i class="fas fa-check-circle"></i> {{ successMessage }}
    </div>
    <div *ngIf="isError" class="auth-alert auth-alert--error">
      <i class="fas fa-exclamation-circle"></i> {{ errorMessage }}
    </div>

    <!-- Form -->
    <form [formGroup]="activationForm" (ngSubmit)="onSubmit()" class="auth-form">

      <div class="field">
        <label for="activationCode">Code d'activation</label>
        <input
          id="activationCode"
          type="text"
          formControlName="activationCode"
          maxlength="6"
          placeholder="— — — — — —"
          class="code-input"
          [class.field-input--error]="activationForm.get('activationCode')?.invalid && activationForm.get('activationCode')?.touched"
        >
        <span
          *ngIf="activationForm.get('activationCode')?.invalid && activationForm.get('activationCode')?.touched"
          class="field-error-msg"
        >
          Le code doit contenir exactement 6 chiffres.
        </span>
      </div>

      <button type="submit" class="auth-btn" [disabled]="activationForm.invalid || isActivating">
        {{ isActivating ? 'Activation...' : 'Activer mon compte' }}
      </button>

    </form>

    <!-- Actions secondaires -->
    <div class="auth-actions">
      <button type="button" (click)="resendActivationCode()" class="auth-link">
        Renvoyer le code
      </button>
      <span class="auth-actions-sep">·</span>
      <button type="button" (click)="goToLogin()" class="auth-link-gray">
        Retour à la connexion
      </button>
    </div>

    <!-- Aide -->
    <div class="help-box">
      <p class="help-item"><i class="fas fa-inbox"></i> Vérifiez votre boîte email et les spams</p>
      <p class="help-item"><i class="fas fa-clock"></i> Le code est valide pendant 24h</p>
    </div>

  </div>
</div>
