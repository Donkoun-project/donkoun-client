<section class="faq">
  <div class="wrap">

    <div class="faq-head">
      <span class="eyebrow">Questions fréquentes</span>
      <h2>Tout ce que vous devez savoir</h2>
      <p>Une question ? Retrouvez les réponses aux interrogations les plus courantes.</p>
    </div>

    <div class="faq-list">
      <div
        class="faq-item"
        *ngFor="let item of faqs; let i = index"
        [class.faq-item--open]="openIndex === i"
      >
        <button class="faq-q" (click)="toggle(i)" [attr.aria-expanded]="openIndex === i">
          <span>{{ item.q }}</span>
          <svg class="faq-chevron" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <div class="faq-a" *ngIf="openIndex === i">
          <p>{{ item.a }}</p>
        </div>
      </div>
    </div>

  </div>
</section>
